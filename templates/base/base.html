{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta
        name="description"
        content="Skilite Build is a professional website colour-system builder."
    >

    <title>
        {% block title %}
            Skilite Build
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Replace YOUR_FONT_AWESOME_KIT with your working kit code. -->
    <script
        src="https://kit.fontawesome.com/YOUR_FONT_AWESOME_KIT.js"
        crossorigin="anonymous"
    ></script>

    <link
        rel="stylesheet"
        href="{% static 'css/global.css' %}"
    >

    {% block extra_css %}
    {% endblock %}
</head>

<body>

    {% include "components/navbar.html" %}

    {% include "components/messages.html" %}

    <main class="site-main">
        {% block content %}
        {% endblock %}
    </main>

    {% include "components/footer.html" %}

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    ></script>

    <script
        src="{% static 'js/global.js' %}"
    ></script>

    {% block extra_js %}
    {% endblock %}

</body>
</html>

{% extends "base/base.html" %}

{% block title %}
    {{ page_title }} | Skilite Build
{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="sk-container-sm">
            <div class="sk-card text-center">
                <div class="sk-icon mb-3">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>

                <h1 class="h2 mb-3">
                    {{ page_title }}
                </h1>

                <p class="sk-text-muted mb-4">
                    {{ page_message }}
                </p>

                <a
                    href="{% url 'core:home' %}"
                    class="btn btn-primary"
                >
                    <i class="fa-solid fa-house me-2"></i>
                    Return Home
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
